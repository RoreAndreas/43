name: Update market data

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les heures (UTC)
  workflow_dispatch:      # Permet de lancer manuellement depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BRVM scraper
        run: python BRVM/brvm_scraper.py
        continue-on-error: true

      - name: Run Richbourse scraper
        run: python RICHBOURSE/richbourse_scraper.py
        continue-on-error: true

      - name: Run SikaP scraper
        run: python SIKAPRO/sikapro_scraper.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BRVM/*.json RICHBOURSE/*.json SIKAPRO/*.json || true
          git commit -m "🔄 Update market data (automated)" --allow-empty || true
          git push
